<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELISE × Pelsung — Curriculum Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue: #0066B2;
      --blue-deep: #001F35;
      --blue-mist: #E8F1F9;
      --dev: #0066B2;
      --design: #4796D1;
      --testing: #7BC950;
      --ba: #F5A623;
      --text: #121518;
      --muted: #4A5058;
      --faint: #8A9098;
      --hair: #E5E8EC;
      --surface: #ffffff;
      --bg: #FAFAFB;
      --grid: rgba(0, 102, 178, 0.045);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Open Sans', 'Aptos', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* ===== SHELL ===== */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: grid;
      grid-template-columns: 260px 1fr;
      align-items: center;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid var(--hair);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 0.85rem; }
    .brand img { height: 40px; display: block; }
    .brand-divider { width: 1px; height: 22px; background: var(--hair); }
    .brand-mark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase; font-weight: 500;
    }

    .crumbs {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.06em;
      color: var(--muted); text-transform: uppercase;
      display: flex; gap: 0.65rem; justify-content: center; align-items: center;
    }
    .crumbs .sep { color: var(--faint); }
    .crumbs .here { color: var(--blue); font-weight: 600; }

    /* ===== MAIN GRID ===== */
    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 65px);
    }

    /* ===== RAIL (phases) ===== */
    .rail {
      border-right: 1px solid var(--hair);
      background: var(--surface);
      padding: 2rem 0 2rem 2rem;
      position: relative;
    }

    .rail-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.64rem; letter-spacing: 0.18em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 1.6rem; padding-right: 2rem;
      display: flex; justify-content: space-between;
    }
    .rail-title .hint { color: var(--faint); }
    .rail-title kbd {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg); border: 1px solid var(--hair);
      padding: 1px 5px; border-radius: 3px;
      font-size: 0.62rem; color: var(--muted);
    }

    .phase-list { list-style: none; position: relative; }
    .phase-list::before {
      content: ''; position: absolute;
      left: 11px; top: 8px; bottom: 8px;
      width: 1px; background: var(--hair);
    }

    .phase-item {
      position: relative;
      padding: 1rem 2rem 1rem 2.4rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .phase-item:hover { background: var(--bg); }
    .phase-item.active {
      background: linear-gradient(90deg, var(--blue-mist) 0%, transparent 85%);
    }

    .phase-dot {
      position: absolute; left: 5px; top: 1.25rem;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--surface); border: 2px solid var(--faint);
      transition: all 0.25s ease;
    }
    .phase-item.active .phase-dot {
      background: var(--blue); border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--blue-mist);
    }
    .phase-item.active .phase-dot::after {
      content: ''; position: absolute; inset: 2px;
      border-radius: 50%; background: var(--surface);
    }

    .phase-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem; letter-spacing: 0.14em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 2px;
    }
    .phase-item.active .phase-num { color: var(--blue); }

    .phase-name {
      font-size: 1.05rem; font-weight: 600; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 4px;
    }
    .phase-item.active .phase-name { color: var(--blue-deep); }

    .phase-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.7rem; }

    .phase-bar {
      height: 3px; background: var(--hair); border-radius: 2px;
      overflow: hidden; margin-right: 1rem;
    }
    .phase-bar-fill {
      height: 100%; background: var(--blue); border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phase-bar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--muted);
      margin-top: 5px; letter-spacing: 0.04em;
      font-weight: 500;
    }

    /* ===== STAGE ===== */
    .stage {
      position: relative;
      padding: 2.2rem 3rem 3rem;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 40px 40px,
        linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 40px 40px,
        var(--bg);
    }

    .stage-head {
      margin-bottom: 2.2rem; padding-bottom: 1.4rem;
      border-bottom: 1px solid var(--hair);
    }

    .stage-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.18em;
      color: var(--blue); text-transform: uppercase;
      margin-bottom: 0.55rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .stage-eyebrow .tick {
      display: inline-block; width: 18px; height: 1px; background: var(--blue);
    }

    .stage-title {
      font-size: 2.3rem; font-weight: 700;
      letter-spacing: -0.025em; color: var(--blue-deep); line-height: 1.05;
    }

    .stage-sub {
      font-size: 1.02rem; color: var(--muted);
      margin-top: 0.6rem; max-width: 60ch;
      line-height: 1.55;
    }

    /* ==== LADDER ==== */
    .ladder {
      position: relative;
      padding-left: 3.5rem;
    }

    .ladder::before {
      content: '';
      position: absolute;
      left: 2.25rem; top: 10px; bottom: 10px;
      width: 1px;
      background: linear-gradient(
        to bottom,
        var(--blue) 0%,
        var(--blue) var(--progress, 0%),
        var(--hair) var(--progress, 0%),
        var(--hair) 100%
      );
    }

    .row {
      position: relative;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 1.25rem;
      align-items: center;
      padding: 0.9rem 1rem 0.9rem 0;
      border-bottom: 1px solid var(--hair);
      transition: background 0.18s, transform 0.18s;
    }
    .row:hover { background: var(--surface); transform: translateX(2px); }
    .row:hover .r-title { color: var(--blue-deep); }

    .row::before {
      content: '';
      position: absolute;
      left: -1.25rem; top: 50%;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--faint);
      transform: translateY(-50%);
      z-index: 2;
      transition: all 0.25s;
    }
    .row.done::before { background: var(--blue); border-color: var(--blue); }

    .r-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem; font-weight: 400;
      color: #6B7178; letter-spacing: -0.02em; line-height: 1;
    }
    .row.done .r-num { color: var(--blue-deep); font-weight: 500; }

    .r-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .r-title {
      font-size: 1.08rem; font-weight: 600;
      color: var(--text); letter-spacing: -0.01em;
      transition: color 0.15s;
    }
    .r-topics {
      font-size: 0.88rem; color: var(--muted); font-weight: 400;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 52ch;
    }

    .chips { display: flex; gap: 4px; }
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.64rem; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 9px; border-radius: 3px;
      border: 1px solid var(--hair);
      color: var(--muted);
      text-decoration: none;
      background: var(--surface);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip.live { color: var(--blue); border-color: var(--blue-mist); background: var(--blue-mist); }
    .chip.live:hover {
      background: var(--blue); color: #fff;
      border-color: var(--blue); transform: translateY(-1px);
    }
    .chip.off { color: var(--faint); border-style: dashed; background: transparent; cursor: not-allowed; }

    .r-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.64rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      padding: 4px 10px; border: 1px dashed var(--faint);
      background: transparent;
      border-radius: 3px;
      white-space: nowrap;
    }

    .stage-head, .ladder {
      animation: fadeSlide 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== SUB-NAV under a phase ===== */
    .sub-list {
      list-style: none;
      margin: 0.3rem 0 0.2rem 2.4rem;
      padding-left: 0.9rem;
      border-left: 1px solid var(--hair);
      display: none;
    }
    .phase-item.open + .sub-list { display: block; }

    .sub-item {
      position: relative;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 1rem 0.55rem 0.85rem;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
      font-weight: 500;
    }
    .sub-item::before {
      content: ''; position: absolute;
      left: -0.95rem; top: 50%;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--faint);
      transform: translateY(-50%);
      transition: background 0.15s;
    }
    .sub-item:hover { color: var(--text); background: var(--bg); }
    .sub-item:hover::before { background: var(--blue); }
    .sub-item.active { color: var(--blue); font-weight: 600; background: var(--blue-mist); }
    .sub-item.active::before { background: var(--blue); width: 8px; height: 8px; left: -1.05rem; }
    .sub-item.muted { color: var(--faint); cursor: default; }
    .sub-item.muted:hover { background: transparent; color: var(--faint); }
    .sub-item.muted:hover::before { background: var(--faint); }
    .sub-item .v-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase;
      font-weight: 500;
    }

    /* ===== BREADCRUMB in stage ===== */
    .stage-crumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: 0.55rem;
    }
    .stage-crumb a {
      color: var(--muted); text-decoration: none;
      border-bottom: 1px dashed transparent;
      padding-bottom: 1px;
      transition: all 0.15s;
    }
    .stage-crumb a:hover { color: var(--blue); border-bottom-color: var(--blue-mist); }
    .stage-crumb .sep { color: var(--faint); }
    .stage-crumb .here { color: var(--blue-deep); font-weight: 600; }

    /* ===== VERTICAL OVERVIEW CARDS ===== */
    .v-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 0.6rem;
    }
    .v-card {
      background: var(--surface);
      border: 1px solid var(--hair);
      border-left: 3px solid var(--swatch, var(--blue));
      border-radius: 4px;
      padding: 1.3rem 1.3rem 1.1rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .v-card:hover { transform: translateY(-2px); border-color: var(--swatch, var(--blue)); box-shadow: 0 8px 24px rgba(0,31,53,0.06); }
    .v-card.muted { opacity: 0.55; cursor: default; }
    .v-card.muted:hover { transform: none; box-shadow: none; border-color: var(--hair); border-left-color: var(--faint); }
    .v-card .v-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .v-card .v-count { color: var(--blue-deep); font-weight: 600; }
    .v-card .v-title {
      font-size: 1.15rem; font-weight: 700;
      color: var(--blue-deep); letter-spacing: -0.015em;
    }
    .v-card .v-topics {
      font-size: 0.83rem; color: var(--muted); line-height: 1.5;
    }
    .v-card .v-cta {
      margin-top: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.64rem; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--swatch, var(--blue));
      padding-top: 0.6rem;
      border-top: 1px dashed var(--hair);
    }
    .v-card.muted .v-cta { color: var(--faint); }

    @media (max-width: 1000px) {
      .main { grid-template-columns: 1fr; }
      .rail { border-right: none; border-bottom: 1px solid var(--hair); padding: 1.5rem; }
      .phase-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .phase-list::before { display: none; }
      .phase-item { padding: 0.8rem; border: 1px solid var(--hair); border-radius: 6px; }
      .phase-dot { display: none; }
      .topbar { grid-template-columns: 1fr; padding: 0.9rem 1rem; }
      .topbar .crumbs { display: none; }
      .stage { padding: 1.5rem 1.2rem; }
      .row { grid-template-columns: 44px 1fr; gap: 0.8rem; }
      .chips { grid-column: 2; justify-self: start; }
      .r-status { grid-column: 2; justify-self: start; }
      .r-topics { white-space: normal; max-width: none; }
    }

    @media (max-width: 640px) {
      body { font-size: 15px; }
      .brand img { height: 32px; }
      .brand-mark { font-size: 0.9rem; }
      .topbar { padding: 0.75rem 0.9rem; }
      .rail { padding: 1.1rem 1rem; }
      .phase-list { grid-template-columns: 1fr 1fr !important; gap: 0.4rem; }
      .stage { padding: 1.1rem 0.9rem !important; }
      .stage h2 { font-size: 1.3rem; }
      .kpi-val, .kpi-val strong { font-size: 1.6rem !important; }
      .kpis { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
      .row { grid-template-columns: 36px 1fr !important; gap: 0.65rem !important; padding: 0.75rem 0.85rem; }
      .r-num { font-size: 0.9rem; }
      .r-title { font-size: 0.95rem; }
      .r-topics, .r-meta { font-size: 0.78rem; }
      .chips { flex-wrap: wrap; }
      .v-grid { grid-template-columns: 1fr !important; gap: 0.75rem; }
      .v-card { padding: 1rem; }
      table { display: block; overflow-x: auto; }
      img { max-width: 100%; height: auto; }
    }
  </style>
</head>

    <header class="topbar">
      <div class="brand">

        <div class="brand-divider"></div>

        </div>
        <ul class="phase-list" id="phase-list"></ul>

      </nav>

      <section class="stage" id="stage"></section>
    </div>

  </div>

  <script>

    const CHIP_LABELS = { slides: 'slides', notes: 'notes' };

    /* ========== DOM helpers (safe — no innerHTML with interpolated strings) ========== */
    function el(tag, attrs, children) {
      const n = document.createElement(tag);
      if (attrs) for (const k in attrs) {
        if (k === 'class') n.className = attrs[k];
        else if (k === 'style') n.setAttribute('style', attrs[k]);
        else if (k.startsWith('data-')) n.setAttribute(k, attrs[k]);
        else if (k in n) n[k] = attrs[k];
        else n.setAttribute(k, attrs[k]);
      }
      if (children != null) {
        const arr = Array.isArray(children) ? children : [children];
        for (const c of arr) {
          if (c == null || c === false) continue;
          n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
      }
      return n;
    }
    function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

    /* ========== state ========== */
    const state = { phase: 1, vertical: null };

    /* ========== counts ========== */
    function countPhase(id) {
      if (id === 2) {
        const total = VERTICALS.filter(v => v.active).reduce((n, v) => n + v.classes.length, 0);
        return { total, built: 0 };
      }
      const rows = CLASSES.filter(c => c.phase === id);
      const built = rows.filter(c => c.status === 'done').length;
      return { total: rows.length, built };
    }

    /* ========== RAIL ========== */
    function renderRail() {
      const list = document.getElementById('phase-list');
      clear(list);

      for (const p of PHASES) {
        const c = countPhase(p.id);
        const pct = typeof c.total === 'number' && c.total > 0
          ? Math.round((c.built / c.total) * 100) : 0;

        const item = el('li', { class: 'phase-item', 'data-phase': String(p.id), tabindex: '0' }, [
          el('span', { class: 'phase-dot' }),
          el('div',  { class: 'phase-num' }, p.num),
          el('div',  { class: 'phase-name' }, p.name),
          el('div',  { class: 'phase-meta' }, p.tag),
        ]);

        item.addEventListener('click', () => selectPhase(p.id));
        item.addEventListener('keydown', (e) => { if (e.key === 'Enter') selectPhase(p.id); });
        list.appendChild(item);

        // sub-nav for Specialization
        if (p.kind === 'verticals') {
          const sub = el('ul', { class: 'sub-list', 'data-sub-for': String(p.id) });
          for (const v of VERTICALS) {
            const li = el('li',
              { class: 'sub-item' + (v.active ? '' : ' muted'), 'data-vertical': v.id },
              [
                el('span', {}, v.name),
                el('span', { class: 'v-tag' }, v.tag)
              ]);
            if (v.active) {
              li.addEventListener('click', (e) => { e.stopPropagation(); selectVertical(v.id); });
            }
            sub.appendChild(li);
          }
          list.appendChild(sub);
        }
      }
    }

    /* ========== chip ========== */
    function chipEl(kind, href) {
      if (!href) {
        return el('span', { class: 'chip off', title: CHIP_LABELS[kind] + ' not yet built' }, CHIP_LABELS[kind]);
      }
      return el('a', { class: 'chip live', href: href, target: '_blank', rel: 'noopener' }, CHIP_LABELS[kind]);
    }

    /* ========== class row (phase 1 / 3) ========== */
    function classRow(r) {
      return el('div', { class: 'row ' + (r.status || '') }, [
        el('div', { class: 'r-num mono' }, r.num),
        el('div', { class: 'r-body' }, [
          el('div', { class: 'r-title' }, r.title),
          el('div', { class: 'r-topics' }, r.topics)
        ]),
        el('div', { class: 'chips' }, [
          chipEl('slides', r.files && r.files.slides),
          chipEl('notes',  r.files && r.files.notes),
        ])
      ]);
    }

    /* ========== vertical overview card ========== */
    function verticalCard(v) {
      const card = el('a',
        {
          class: 'v-card' + (v.active ? '' : ' muted'),
          style: '--swatch: var(--' + v.id + ');',
          href: v.active ? '#' : null
        },
        [
          el('div', { class: 'v-eyebrow' }, [
            el('span', {}, v.short),
            el('span', { class: 'v-count' }, v.tag)
          ]),
          el('div', { class: 'v-title' }, v.name),
          el('div', { class: 'v-topics' }, v.sub),
          el('div', { class: 'v-cta' }, v.active ? 'Open curriculum →' : 'Not in this cohort')
        ]
      );
      if (v.active) {
        card.addEventListener('click', (e) => { e.preventDefault(); selectVertical(v.id); });
      } else {
        card.addEventListener('click', (e) => e.preventDefault());
      }
      return card;
    }

    /* ========== simple class row (for verticals/capstone — shows chips if files exist) ========== */
    function plainClassRow(r) {
      if (r.files && (r.files.slides || r.files.notes)) {
        return classRow(r);
      }
      return el('div', { class: 'row' }, [
        el('div', { class: 'r-num mono' }, r.num),
        el('div', { class: 'r-body' }, [
          el('div', { class: 'r-title' }, r.title),
          el('div', { class: 'r-topics' }, r.topics)
        ]),
        el('div', { class: 'r-status' }, 'planned')
      ]);
    }

    /* ========== STAGE ========== */
    function renderStage() {
      const stage = document.getElementById('stage');
      clear(stage);

      const p = PHASES.find(x => x.id === state.phase);

      // Phase 2 + vertical selected → vertical detail view
      if (p.kind === 'verticals' && state.vertical) {
        const v = VERTICALS.find(x => x.id === state.vertical);

        const crumb = el('div', { class: 'stage-crumb' }, [
          linkText('Curriculum', () => selectPhase(1)),
          el('span', { class: 'sep' }, '/'),
          linkText(p.name, () => selectPhase(2)),
          el('span', { class: 'sep' }, '/'),
          el('span', { class: 'here' }, v.name)
        ]);

        const head = el('div', { class: 'stage-head' }, [
          el('div', {}, [
            el('div', { class: 'stage-eyebrow' }, [
              el('span', { class: 'tick' }),
              'Vertical · ' + v.short
            ]),
            el('h1',  { class: 'stage-title' }, v.name),
            el('p',   { class: 'stage-sub' }, v.sub)
          ])
        ]);

        const ladder = el('div', { class: 'ladder' });
        for (const r of v.classes) ladder.appendChild(plainClassRow(r));

        stage.appendChild(crumb);
        stage.appendChild(head);
        stage.appendChild(ladder);
        return;
      }

      // Phase 2 overview → vertical cards
      if (p.kind === 'verticals') {
        const crumb = el('div', { class: 'stage-crumb' }, [
          linkText('Curriculum', () => selectPhase(1)),
          el('span', { class: 'sep' }, '/'),
          el('span', { class: 'here' }, p.name)
        ]);

        const head = el('div', { class: 'stage-head' }, [
          el('div', {}, [
            el('div', { class: 'stage-eyebrow' }, [el('span', { class: 'tick' }), p.num]),
            el('h1',  { class: 'stage-title' }, p.name),
            el('p',   { class: 'stage-sub' }, p.sub)
          ])
        ]);

        const grid = el('div', { class: 'v-grid' });
        for (const v of VERTICALS) grid.appendChild(verticalCard(v));

        stage.appendChild(crumb);
        stage.appendChild(head);
        stage.appendChild(grid);
        return;
      }

      // Phase 1 or 3 → class ladder
      const c = countPhase(p.id);
      const progress = c.total > 0 ? Math.min(100, Math.round((c.built / c.total) * 100)) : 0;

      const head = el('div', { class: 'stage-head' }, [
        el('div', {}, [
          el('div', { class: 'stage-eyebrow' }, [el('span', { class: 'tick' }), p.num]),
          el('h1',  { class: 'stage-title' }, p.name),
          el('p',   { class: 'stage-sub' }, p.sub)
        ])
      ]);

      const ladder = el('div', { class: 'ladder', style: '--progress:' + progress + '%' });
      const rows = CLASSES.filter(c => c.phase === p.id);
      for (const r of rows) ladder.appendChild(classRow(r));

      stage.appendChild(head);
      stage.appendChild(ladder);
    }

    function linkText(text, handler) {
      const a = el('a', { href: '#' }, text);
      a.addEventListener('click', (e) => { e.preventDefault(); handler(); });
      return a;
    }

    function syncRail() {
      document.querySelectorAll('.phase-item').forEach(e => {
        const pid = parseInt(e.getAttribute('data-phase'), 10);
        e.classList.toggle('active', pid === state.phase);
        e.classList.toggle('open', pid === 2 && state.phase === 2);
      });
      document.querySelectorAll('.sub-item').forEach(e => {
        e.classList.toggle('active', e.getAttribute('data-vertical') === state.vertical);
      });
    }

    function selectPhase(id) {
      state.phase = id;
      state.vertical = null;
      syncRail();
      renderStage();
    }

    function selectVertical(id) {
      state.phase = 2;
      state.vertical = id;
      syncRail();
      renderStage();
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape' && state.vertical) selectPhase(2);
    });

    renderRail();
    selectPhase(1);
  </script>
