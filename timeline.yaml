- date: 2026-04-02
  title: Training approach call with Rajiv Hassan
  category: planning
  program: pelsung-c3
  tags: [SELISE Blocks, Agent OS, spec-driven, AI, curriculum]
  people: [Tek Nath Acharya, Rajiv Hassan]
  location: Remote
  body: >
    Call with Rajiv Hassan (CPO, SELISE Group AG) to discuss training approach.
    Two key directions: (1) Use SELISE Blocks — the company's composable aPaaS
    platform with modular microservices and packaged business capabilities — as
    the foundation for trainee projects. (2) Adopt Agent OS for spec-driven
    development, aligning with the AI-era hourglass model where coding standards
    and specs drive AI-powered implementation.

