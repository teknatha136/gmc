- date: 2026-03-08
  title: SELISE X Pelsung presentation to Cohort 3
  category: milestone
  program: pelsung-c3
  tags: [presentation, pelsung, cohort-3, gelephu]
  people: [Tek Nath Acharya]
  location: Pelrithang, Royal Bhutan Army Wing IX, Gelephu
  body: >
    Tek Nath Acharya presented "SELISE X Pelsung" to the 3rd cohort of Pelsung.
    Introduced SELISE Group AG and its 14+ year track record (700 employees,
    1200+ projects, global delivery hubs). Outlined the vision for launching
    SELISE GMC aligned with the Gelephu Mindfulness City initiative. Announced
    plans to form a Digital Sub-Cohort of up to 50 candidates trained across
    4 verticals — Software Development, Business Analysis, UX Design, and
    QA/Testing — with a structured program including corporate skills training
    and core specialization, leading to potential hiring into SELISE.

